name: Theme Visual Smoke

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  visual-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Start local WordPress stack
        run: docker compose up -d db wordpress setup

      - name: Wait for WordPress
        run: |
          for i in {1..40}; do
            if curl -fsS http://localhost:8080/ >/dev/null; then
              exit 0
            fi
            sleep 3
          done
          echo "WordPress did not become ready in time."
          exit 1

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run visual overflow smoke test
        env:
          XPRESSUI_THEME_BASE_URL: http://localhost:8080
        run: npm run visual:smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Stop local WordPress stack
        if: always()
        run: docker compose down -v

